<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hunter X Hunter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <button>Home</button>
      <button>About</button>
      <button>Characters</button>
      <button>Nen Abilities</button>
    </div>
  </nav>

  <main class="grid-container">

    <div class="card">
      <img src="assets/Gon.jpeg" alt="image">
      <div class="card-content">
        <h2>Gon Freecss</h2>
        <p>A determined young Hunter searching for his father.</p>
        <div class="btn-group">
          <button>Info</button>
          <button>More</button>
        </div>
      </div>
    </div>

    <div class="card">
      <img src="assets/Killua.png" alt="image">
      <div class="card-content">
        <h2>Killua Zoldyck</h2>
        <p>A skilled assassin with lightning-fast abilities.</p>
        <div class="btn-group">
          <button>Info</button>
          <button>More</button>
        </div>
      </div>
    </div>

    <div class="card">
      <img src="assets/Kurapika.jpg" alt="image">
      <div class="card-content">
        <h2>Kurapika</h2>
        <p>The last of the Kurta clan seeking revenge.</p>
        <div class="btn-group">
          <button>Info</button>
          <button>More</button>
        </div>
      </div>
    </div>

    <div class="card">
      <img src="assets/Leorio.png" alt="image">
      <div class="card-content">
        <h2>Leorio Paradinight</h2>
        <p>A future doctor with a strong sense of justice.</p>
        <div class="btn-group">
          <button>Info</button>
          <button>More</button>
        </div>
      </div>
    </div>

  </main>

</body>
</html>
