<!DOCTYPE html>
<html>
    <head>
        <title>Boss Encounter</title>
    </head>

    <body class="battle" style="background-image: url('./assets/battle-background.png'); background-size: cover; background-position: center; background-repeat: no-repeat; font-family: 'Times New Roman', Times, serif; text-align: center; height: 100vh;">
        <h1 id="boss" style="font-size: 50px; margin-bottom: 100px; color: red;">Defeat Boss</h1>

        <div style="position: absolute; bottom: 300px; left: 300px; width: 250px; height: 25px;border: 2px solid white; border-radius: 5px;">
            <div style="width: 100%; height: 100%; background-color: limegreen; border-radius: 5px;"></div>
        </div>
        <span style="position: absolute; bottom: 300px; left: 200px; margin-top: -2px; color: white; font-weight: bold;">Player HP</span>

        <div style="position: absolute; bottom: 300px; left: 2100px; width: 250px; height: 25px;border: 2px solid white; border-radius: 5px;">
            <div style="width: 100%; height: 100%; background-color: limegreen; border-radius: 5px;"></div>
        </div>
        <span style="position: absolute; bottom: 300px; left: 2000px; margin-top: -2px; color: white; font-weight: bold;">Boss HP</span>

        <section class="boss" style="text-align: right; margin-right: 300px;">
            <img src="./assets/dragon.png" 
                style="width: 400px; height: auto; position: relative; top: 225px;">
                
        </section>

        <section class="hero" style="text-align: right; margin-right: 1800px;">
            <img src="./assets/joshua.png"
                style="width: 100px; height: auto; position: relative; top: 50px;">
        </section>

        <ol style="
            position: absolute;
            bottom: 100px;
            left: 10%;
            list-style: decimal;
            text-align: left;
            font-size: 24px;
            color: white;
            padding: 0;">

            <li><button>Attack</button></li>
            <li><label id="item" for="item-select">Item</label>
                <select id="item-select">
                    <option value="axe">Axe</option>
                    <option value="heal">Heal</option>
                </select>
            </li>
            <li><button>Wait</button></li>
        </ol>
    </body>
</html>
